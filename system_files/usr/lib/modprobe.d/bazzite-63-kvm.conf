# KVM nested-MSR tolerance, needed by Windows 11 guests under libvirt +
# QEMU on consumer Intel/AMD CPUs that expose unimplemented MSRs. Without
# these KVM injects #GP on unsupported MSR accesses (Windows guest
# panics) and dmesg floods with "ignored rdmsr".
#
# ignore_msrs=1         -> KVM returns 0 instead of #GP (Windows-friendly).
# report_ignored_msrs=0 -> suppress the dmesg spam from ignore_msrs.
#
# kvm.ko is a loadable module, so kmod applies these options at every
# module load on any deployment kind — rpm-ostree-managed ones included
# (/usr/lib/bootc/kargs.d is processed only by bootc install/switch/
# upgrade, so a karg reaches bootc-managed deployments alone).
options kvm ignore_msrs=1 report_ignored_msrs=0
