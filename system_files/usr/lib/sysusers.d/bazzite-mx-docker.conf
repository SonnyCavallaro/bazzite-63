# Create the docker group via systemd-sysusers. docker-ce's rpm
# postinstall scriptlet (`groupadd --system docker`) is suppressed on
# rpm-ostree atomic images, so without this entry the group never exists
# and the bazzite-mx-groups hook skips it, leaving `docker run` to
# require sudo.
#
# systemd-sysusers.service runs at sysinit.target on every boot.
# Type `g`, name `docker`, ID `-` (auto-assigned in the system range).
# Reference: systemd.sysusers(5).
g docker -
