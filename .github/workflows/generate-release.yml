name: Generate Release

on:
  workflow_call:
    inputs:
      stream_name:
        description: "Upstream stream: stable or testing"
        required: true
        type: string
      upstream_tag:
        description: "Upstream Bazzite tag, e.g. 44.20260513"
        required: true
        type: string
      release_tag:
        description: "Downstream release tag ([testing-]MAJOR.<build date>, plus .N for same-day rebuilds)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      stream_name:
        description: "stable | testing"
        type: choice
        options: [stable, testing]
        default: stable
        required: true
      upstream_tag:
        description: "Upstream tag (empty = latest for stream)"
        type: string
        required: false
        default: ""
      release_tag:
        description: "Downstream release tag (empty = release the newest unreleased GHCR build for the stream)"
        type: string
        required: false
        default: ""

permissions: {}

concurrency:
  group: bazzite-63-release-${{ inputs.stream_name }}-${{ inputs.upstream_tag }}
  cancel-in-progress: false

jobs:
  generate-release:
    name: Compose changelog & publish
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Resolve inputs
        id: inputs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_STREAM_NAME: ${{ inputs.stream_name }}
          INPUT_UPSTREAM_TAG: ${{ inputs.upstream_tag }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          REPO_FULL: ${{ github.repository }}
        run: |
          set -euo pipefail
          STREAM="$INPUT_STREAM_NAME"
          UP="$INPUT_UPSTREAM_TAG"
          if [ -z "$UP" ]; then
            if [ "$STREAM" = "stable" ]; then
              UP=$(gh release view --repo ublue-os/bazzite --json tagName -q .tagName)
            else
              UP=$(gh release list --repo ublue-os/bazzite --json tagName,publishedAt --limit 50 \
                | jq -r '[.[] | select(.tagName|startswith("testing-"))] | sort_by(.publishedAt) | last | .tagName')
            fi
          fi
          # Strip a stray downstream .N: upstream tags are [testing-]MAJOR.DATE
          # (two numeric groups). Upstream does publish genuine same-day
          # rebuild tags with three groups, so the strip only fires when the
          # 3-group tag is NOT a real upstream release (same 404-gated rule
          # as the resolve job in build-{stable,testing}).
          if [[ "$UP" =~ ^(testing-)?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            if ! gh release view "$UP" --repo ublue-os/bazzite >/dev/null 2>&1; then
              echo "::warning::upstream tag ${UP} not found on ublue-os/bazzite; using ${UP%.*}"
              UP="${UP%.*}"
            fi
          fi
          OWNER_LC="${REPO_FULL%%/*}"; OWNER_LC="${OWNER_LC,,}"
          RT="$INPUT_RELEASE_TAG"
          if [ -n "$RT" ]; then
            # Friendly gate: a missing tag (typo, or a build that never
            # pushed) would otherwise die as a cryptic skopeo 404 at the
            # digest-pinning step.
            for img in bazzite-63; do
              if ! skopeo inspect --no-tags "docker://ghcr.io/${OWNER_LC}/${img}:${RT}" >/dev/null 2>&1; then
                echo "ERROR: no GHCR image ${img} is tagged ${RT} — nothing to release for this tag."
                exit 1
              fi
            done
          else
            # workflow_dispatch recovery: release the NEWEST GHCR build that
            # carries a schema tag with no matching GitHub Release — works
            # regardless of the day the orphaned build was pushed.
            # gh exits 0 with empty output when the repo has no releases yet;
            # a real API failure aborts via set -e.
            if [ "$STREAM" = "stable" ]; then
              PAT='^[0-9]+\.[0-9]+(\.[0-9]+)?$'
            else
              PAT='^testing-[0-9]+\.[0-9]+(\.[0-9]+)?$'
            fi
            EXISTING=$(gh release list --repo "$REPO_FULL" --limit 200 --json tagName -q '.[].tagName')
            CANDIDATES=$(skopeo list-tags "docker://ghcr.io/${OWNER_LC}/bazzite-63" \
              | jq -r '.Tags[]' | grep -E "$PAT" || true)
            if [ -n "$EXISTING" ] && [ -n "$CANDIDATES" ]; then
              CANDIDATES=$(printf '%s\n' "$CANDIDATES" \
                | grep -vxF -f <(printf '%s\n' "$EXISTING") || true)
            fi
            RT=$(printf '%s\n' "$CANDIDATES" | grep . | sort -V | tail -1 || true)
            if [ -z "$RT" ]; then
              echo "ERROR: no unreleased GHCR build found for stream ${STREAM} — every pushed build already has its release."
              echo "To re-release an existing build, pass release_tag explicitly."
              exit 1
            fi
          fi
          {
            echo "stream_name=$STREAM"
            echo "upstream_tag=$UP"
            echo "release_tag=$RT"
          } >> "$GITHUB_OUTPUT"
          echo "Stream=$STREAM upstream=$UP release_tag=$RT"

      - name: Find previous release
        id: prev
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STREAM_NAME: ${{ steps.inputs.outputs.stream_name }}
          RELEASE_TAG: ${{ steps.inputs.outputs.release_tag }}
        run: |
          set -euo pipefail
          if [ "$STREAM_NAME" = "stable" ]; then
            PATTERN='^[0-9]+\.[0-9]+(\.[0-9]+)?$'
          else
            PATTERN='^testing-[0-9]+\.[0-9]+(\.[0-9]+)?$'
          fi
          # Sort by publishedAt, not createdAt: a Release's createdAt is the
          # target commit's date, and every upstream-rebuild release tags the
          # same unchanged main HEAD, so all createdAt values tie and `last`
          # degenerates to the oldest release. publishedAt is monotonic.
          PREV=$(gh release list --repo "$GITHUB_REPOSITORY" --json tagName,publishedAt --limit 200 \
            | jq -r --arg p "$PATTERN" --arg cur "$RELEASE_TAG" \
                '[.[] | select(.tagName | test($p)) | select(.tagName != $cur)] | sort_by(.publishedAt) | last | .tagName // ""')
          # Downstream tags carry the build date, so the upstream tag a release
          # was built off is recoverable only from the release itself: its title
          # records it as "<tag>: <Stream> (Bazzite <upstream_tag>)".
          PREV_UPSTREAM=""
          if [ -n "$PREV" ]; then
            # Best-effort: images are already pushed and signed at this point,
            # so a failed lookup degrades the changelog (compare link omitted)
            # rather than failing the release job.
            NAME=$(gh release view "$PREV" --repo "$GITHUB_REPOSITORY" --json name -q .name 2>/dev/null || true)
            PREV_UPSTREAM=$(printf '%s' "$NAME" | sed -n 's/.*(Bazzite \(.*\))$/\1/p')
          fi
          # 404-gate the parsed tag against real upstream releases: a title
          # edited by hand or off-format must not become a broken compare link.
          if [ -n "$PREV_UPSTREAM" ] \
             && ! gh release view "$PREV_UPSTREAM" --repo ublue-os/bazzite >/dev/null 2>&1; then
            echo "::warning::previous release title cites unknown upstream tag ${PREV_UPSTREAM}; compare link omitted"
            PREV_UPSTREAM=""
          fi
          {
            echo "tag=$PREV"
            echo "upstream=$PREV_UPSTREAM"
          } >> "$GITHUB_OUTPUT"
          echo "Previous release: ${PREV:-<none>} (upstream: ${PREV_UPSTREAM:-<unknown>})"

      - name: Pin image digests
        id: digests
        env:
          RELEASE_TAG: ${{ steps.inputs.outputs.release_tag }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          OWNER_LC="${OWNER,,}"
          resolve() {
            skopeo inspect --no-tags "docker://ghcr.io/${OWNER_LC}/$1:${RELEASE_TAG}" | jq -r .Digest
          }
          {
            echo "base=$(resolve bazzite-63)"
          } >> "$GITHUB_OUTPUT"

      - name: Render changelog body
        env:
          STREAM_NAME: ${{ steps.inputs.outputs.stream_name }}
          UPSTREAM_TAG: ${{ steps.inputs.outputs.upstream_tag }}
          RELEASE_TAG: ${{ steps.inputs.outputs.release_tag }}
          PREV_TAG: ${{ steps.prev.outputs.tag }}
          PREV_UPSTREAM: ${{ steps.prev.outputs.upstream }}
          DIGEST_MAIN: ${{ steps.digests.outputs.base }}
        run: |
          set -euo pipefail
          ./.github/scripts/changelog.sh \
            "$UPSTREAM_TAG" "$RELEASE_TAG" "$PREV_TAG" \
            "$DIGEST_MAIN" "$STREAM_NAME" "$PREV_UPSTREAM" > changelog.md
          echo "--- preview ---"
          head -60 changelog.md

      - name: Publish release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          name: "${{ format('{0}: {1} (Bazzite {2})', steps.inputs.outputs.release_tag, steps.inputs.outputs.stream_name == 'stable' && 'Stable' || 'Testing', steps.inputs.outputs.upstream_tag) }}"
          tag_name: ${{ steps.inputs.outputs.release_tag }}
          body_path: ./changelog.md
          make_latest: ${{ steps.inputs.outputs.stream_name == 'stable' }}
          prerelease: ${{ steps.inputs.outputs.stream_name != 'stable' }}
          target_commitish: ${{ github.sha }}
