name: Reusable Build

on:
  workflow_call:
    inputs:
      stream_name:
        description: "Upstream stream: stable or testing"
        required: true
        type: string
      upstream_tag:
        description: "Immutable upstream release tag (e.g. 44.20260430). If empty, latest release for the stream is resolved at runtime."
        required: false
        type: string
        default: ""
      release_tag:
        description: "Downstream release tag used as the immutable image tag on GHCR (e.g. 44.20260511.1 for a rebuild). Defaults to upstream_tag when empty."
        required: false
        type: string
        default: ""

permissions:
  contents: read
  packages: write

env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  REGISTRY_AUTH_FILE: /tmp/registry-auth/config.json
  DOCKER_CONFIG: /tmp/registry-auth
  # Guard for push/sign steps: only on push to main (not PR, not develop).
  # `github.workflow` would resolve to the caller's workflow in reusable
  # invocations, so we use a stable literal in the concurrency group below.
  PUSH_ENABLED: ${{ github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

concurrency:
  group: bazzite-63-reusable-${{ inputs.stream_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.image_name }}-${{ inputs.stream_name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: bazzite-63
            base_image: bazzite
    steps:
      - name: Prepare environment
        env:
          MATRIX_IMAGE_NAME: ${{ matrix.image_name }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> "$GITHUB_ENV"
          echo "IMAGE_VENDOR=${REPO_OWNER,,}" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=${MATRIX_IMAGE_NAME}" >> "$GITHUB_ENV"

      - name: Resolve upstream tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_UPSTREAM_TAG: ${{ inputs.upstream_tag }}
          INPUT_STREAM_NAME: ${{ inputs.stream_name }}
        run: |
          set -euo pipefail
          UPSTREAM_TAG="$INPUT_UPSTREAM_TAG"
          if [ -z "$UPSTREAM_TAG" ]; then
            if [ "$INPUT_STREAM_NAME" = "stable" ]; then
              UPSTREAM_TAG=$(gh release view --repo ublue-os/bazzite --json tagName -q .tagName)
            else
              UPSTREAM_TAG=$(gh release list --repo ublue-os/bazzite --json tagName,publishedAt --limit 50 \
                | jq -r '[.[] | select(.tagName|startswith("testing-"))] | sort_by(.publishedAt) | last | .tagName')
            fi
          fi
          echo "UPSTREAM_TAG=$UPSTREAM_TAG" >> "$GITHUB_ENV"
          echo "Resolved upstream tag: $UPSTREAM_TAG"

      - name: Get current date
        id: date
        run: |
          set -euo pipefail
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Free up runner disk space
        uses: ublue-os/remove-unwanted-software@695eb75bc387dbcd9685a8e72d23439d8686cba6 # v10

      - name: Mount BTRFS for podman storage
        uses: ublue-os/container-storage-action@dc1f4c8f17b672069e921f001132f7cf98a423a6 # pinned 2026-02-11
        continue-on-error: true
        with:
          target-dir: /var/lib/containers
          mount-opts: compress-force=zstd:2
          loopback-free: '1'

      - name: Resolve upstream digest
        id: digest
        env:
          BASE_IMAGE: ${{ matrix.base_image }}
        run: |
          set -euo pipefail
          DIGEST=$(skopeo inspect --no-tags "docker://ghcr.io/ublue-os/${BASE_IMAGE}:${UPSTREAM_TAG}" | jq -r .Digest)
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "Upstream digest: $DIGEST"

      - name: Resolve kernel version
        env:
          BASE_IMAGE: ${{ matrix.base_image }}
        run: |
          set -euo pipefail
          KV=$(skopeo inspect --no-tags "docker://ghcr.io/ublue-os/${BASE_IMAGE}:${UPSTREAM_TAG}" \
                | jq -r '.Labels["ostree.linux"]')
          [ -n "$KV" ] && [ "$KV" != "null" ] || { echo "ostree.linux label missing"; exit 1; }
          echo "KERNEL_VERSION=$KV" >> "$GITHUB_ENV"
          echo "Kernel version: $KV"

      - name: Compute version tags
        env:
          STREAM_NAME: ${{ inputs.stream_name }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          # STREAM_VERSION: upstream tag without the "<stream>-" prefix
          # (stable tags from ublue-os/bazzite have no prefix; testing tags do)
          STREAM_VERSION="${UPSTREAM_TAG#${STREAM_NAME}-}"
          # FEDORA_MAJOR: leading numeric component of STREAM_VERSION
          FEDORA_MAJOR="${STREAM_VERSION%%.*}"
          # RELEASE_TAG: caller-provided downstream tag, or fall back to UPSTREAM_TAG.
          # On develop/PR the resolve job is skipped so this is empty → mutable tag,
          # but push/sign steps are also skipped, so the value is informational only.
          RELEASE_TAG="${INPUT_RELEASE_TAG:-$UPSTREAM_TAG}"
          echo "STREAM_VERSION=${STREAM_VERSION}" >> "$GITHUB_ENV"
          echo "FEDORA_MAJOR=${FEDORA_MAJOR}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"
          echo "Stream version: ${STREAM_VERSION}"
          echo "Fedora major: ${FEDORA_MAJOR}"
          echo "Release tag: ${RELEASE_TAG}"

      - name: Compute OCI metadata
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        id: metadata
        with:
          tags: |
            type=raw,value=latest,enable=${{ inputs.stream_name == 'stable' }}
            type=raw,value=${{ inputs.stream_name }}
            type=raw,value=${{ inputs.stream_name }}-${{ env.FEDORA_MAJOR }}
            type=raw,value=${{ inputs.stream_name }}-${{ env.STREAM_VERSION }}
            type=raw,value=${{ env.RELEASE_TAG }}
            type=sha,enable=${{ github.event_name == 'pull_request' }}
            type=ref,event=pr
          labels: |
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.description=${{ github.event.repository.description }}
            org.opencontainers.image.vendor=${{ env.IMAGE_VENDOR }}
            org.opencontainers.image.version=${{ env.STREAM_VERSION }}
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}/tree/${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}/blob/${{ github.sha }}/Containerfile
            org.opencontainers.image.documentation=https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/README.md
            org.opencontainers.image.base.name=ghcr.io/ublue-os/${{ matrix.base_image }}:${{ env.UPSTREAM_TAG }}
            org.opencontainers.image.base.digest=${{ steps.digest.outputs.digest }}
            containers.bootc=1
          sep-tags: " "
          sep-annotations: " "

      - name: Compose build args
        env:
          BASE_IMAGE: ${{ matrix.base_image }}
          UPSTREAM_DIGEST: ${{ steps.digest.outputs.digest }}
        run: |
          set -euo pipefail
          printf '%s\n' \
            "BASE_IMAGE=${BASE_IMAGE}" \
            "BASE_TAG=${UPSTREAM_TAG}" \
            "IMAGE_NAME=${IMAGE_NAME}" \
            "IMAGE_VENDOR=${IMAGE_VENDOR}" \
            "VERSION=${STREAM_VERSION}" \
            "UPSTREAM_DIGEST=${UPSTREAM_DIGEST}" \
            "UPSTREAM_TAG=${UPSTREAM_TAG}" \
            "KERNEL_VERSION=${KERNEL_VERSION}" \
            "FEDORA_VERSION=${FEDORA_MAJOR}" \
            > build_args.txt

      # Build into a single repository-only reference (raw-img). Labels
      # are applied in the next step so they survive rechunk's commit cycle.
      - name: Build image
        id: build_image
        run: |
          set -euo pipefail
          sudo -E buildah build \
            --retry 5 --retry-delay 60s \
            --file Containerfile \
            --build-arg-file build_args.txt \
            --tag raw-img \
            .

      # Re-apply OCI labels and annotations on the buildah image, then
      # commit with --identity-label=false to strip io.buildah.commit.id
      # (rpm-ostree compose build-chunked-oci is sensitive to it).
      - name: Apply OCI labels
        env:
          IMAGE_LABELS: ${{ steps.metadata.outputs.labels }}
        run: |
          set -euo pipefail
          mapfile -t labels <<< "$IMAGE_LABELS"
          container=$(sudo buildah from raw-img)
          for line in "${labels[@]}"; do
            [ -z "$line" ] && continue
            sudo buildah config --label "$line" --annotation "$line" "$container"
          done
          sudo buildah commit --identity-label=false --rm "$container" raw-img

      # Semantic re-layering via bootc's native `rpm-ostree compose
      # build-chunked-oci`: finer-grained chunks for better resumability,
      # smaller incremental `bootc upgrade` pulls, and registry-side
      # cross-image dedup, at ~13-15 min added per matrix job. Runs
      # in-image (no external action pin) and integrates with the
      # cosign-by-digest sign step that follows the push.
      - name: Rechunk layers
        id: rechunk
        if: env.PUSH_ENABLED == 'true'
        run: |
          set -euo pipefail
          container=$(sudo buildah from raw-img)
          mnt=$(sudo buildah mount "$container")
          sudo bash -c "rm -rf $mnt/run/.* $mnt/run/* $mnt/tmp/.* $mnt/tmp/*"
          sudo buildah umount "$container"
          sudo buildah commit --identity-label=false --rm "$container" raw-img

          sudo podman run --rm --privileged \
              --volume /var/lib/containers:/var/lib/containers \
              localhost/raw-img \
              rpm-ostree compose build-chunked-oci \
              --bootc --max-layers 127 --format-version 2 \
              --from localhost/raw-img \
              --output containers-storage:localhost/chunked-img
          sudo podman untag raw-img

          echo "ref=containers-storage:localhost/chunked-img" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: env.PUSH_ENABLED == 'true'
        env:
          GH_REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REGISTRY_USER: ${{ github.actor }}
        run: |
          set -euo pipefail
          sudo mkdir -p "$(dirname "$REGISTRY_AUTH_FILE")"
          echo "$GH_REGISTRY_TOKEN" | sudo -E podman login ghcr.io -u "$GH_REGISTRY_USER" --password-stdin

      # Sign-before-publish: push to a staging tag first, sign that digest,
      # then copy onto the release tags, so no release tag ever points to an
      # unsigned manifest (pattern from aurora reusable-build.yml).
      - name: Push staging tag
        if: env.PUSH_ENABLED == 'true'
        id: pre-push
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        env:
          OUTPUT_IMAGE: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          SOURCE_REF: ${{ steps.rechunk.outputs.ref }}
          STAGING_TAG: staging-${{ inputs.stream_name }}
        with:
          max_attempts: 3
          retry_wait_seconds: 15
          timeout_minutes: 10
          command: |
            set -euo pipefail
            sudo -E skopeo copy "${SOURCE_REF}" "docker://${OUTPUT_IMAGE}:${STAGING_TAG}" \
              --digestfile /tmp/digestfile
            digest=$(< /tmp/digestfile)
            echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        if: env.PUSH_ENABLED == 'true'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: 'v2.6.3'

      - name: Sign container image
        if: env.PUSH_ENABLED == 'true'
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
          COSIGN_PASSWORD: ""
          IMAGE_FULL: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          DIGEST: ${{ steps.pre-push.outputs.digest }}
        run: |
          set -euo pipefail
          sudo -E "$(command -v cosign)" sign -y --key env://COSIGN_PRIVATE_KEY --new-bundle-format=false "${IMAGE_FULL}@${DIGEST}"

      # Release tags are copied by digest from the signed staging manifest:
      # registry-side blob reuse (no re-upload) and a byte-identical manifest,
      # so every release tag points exactly at the digest cosign signed.
      - name: Push to GHCR
        if: env.PUSH_ENABLED == 'true'
        id: push
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        env:
          OUTPUT_IMAGE: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          IMAGE_TAGS: ${{ steps.metadata.outputs.tags }}
          STAGING_DIGEST: ${{ steps.pre-push.outputs.digest }}
        with:
          max_attempts: 3
          retry_wait_seconds: 15
          timeout_minutes: 10
          command: |
            set -euo pipefail
            # sort -u: on the first testing release the stream-version tag and
            # RELEASE_TAG coincide (testing-X vs X.N only diverge on rebuilds),
            # so the raw list can contain the same tag twice.
            for tag in $(printf '%s\n' $IMAGE_TAGS | sort -u); do
              sudo -E skopeo copy --preserve-digests \
                "docker://${OUTPUT_IMAGE}@${STAGING_DIGEST}" \
                "docker://${OUTPUT_IMAGE}:${tag}"
            done
            echo "digest=${STAGING_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Report build summary
        if: always()
        env:
          OUTPUT_IMAGE: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          STAGING_DIGEST: ${{ steps.pre-push.outputs.digest }}
          PUSHED_DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          if [ -n "$PUSHED_DIGEST" ]; then
            {
              echo "### Pushed digests"
              echo '```'
              echo "staging: ${OUTPUT_IMAGE}@${STAGING_DIGEST}"
              echo "release: ${OUTPUT_IMAGE}@${PUSHED_DIGEST}"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          {
            echo "### Disk usage"
            echo '```'
            df -h
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  check:
    name: Validate ${{ inputs.stream_name }} matrix
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    steps:
      - name: Verify matrix results
        env:
          JOBS: ${{ toJson(needs) }}
        run: |
          set -euo pipefail
          echo "Job status:"
          echo "$JOBS" | jq -r 'to_entries[] | " - \(.key): \(.value.result)"'
          for r in $(echo "$JOBS" | jq -r 'to_entries[] | .value.result'); do
            if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
              echo "Status check not okay!"
              exit 1
            fi
          done
